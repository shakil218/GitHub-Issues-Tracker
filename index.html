<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- title -->
    <title>GitHub Issues Tracker | Login</title>

    <!-- favicon -->
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- tailwind + daisyui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- stylesheet -->
    <link rel="stylesheet" href="styles/styles.css" />
  </head>
  <body>
    <!-- Sign In form -->
    <div
      class="min-h-screen flex items-center justify-center bg-linear-to-r from-[#000428] to-[#014d8f] p-4"
    >
      <!-- Glass Card -->
      <div
        class="w-full max-w-sm bg-white/20 backdrop-blur-xl border border-white/20 shadow-2xl rounded-lg p-6"
      >
        <!--  Image + Header + Description -->
        <div class="flex flex-col items-center text-center mb-6">
          <img
            src="./assets/github-logo.png"
            alt="GitHub Logo"
            class="w-20 mx-auto mb-3"
          />
          <h3 class="text-2xl font-bold text-white">GitHub Issues Tracker</h3>
          <p class="text-white/80 text-sm">Sign in to manage your issues</p>
        </div>

        <!-- Form -->
        <form id="login-form" class="fieldset space-y-4">
          <!-- username -->
          <div>
            <label class="label text-lg font-medium text-white">Username</label>
            <input
            id="username"
              type="text"
              class="input w-full bg-white/20 text-white placeholder-white/70"
              placeholder="Enter Username"
            />
          </div>

          <!-- password -->
          <div>
            <label class="label text-lg font-medium text-white">Password</label>
            <input
            id="password"
              type="password"
              class="input w-full bg-white/20 text-white placeholder-white/70"
              placeholder="Enter Password"
            />
          </div>

          <!-- sign in button -->
          <button type="submit" class="btn btn-neutral w-full">Sign In</button>

          <!-- Divider (white) -->
          <div class="divider text-white mt-4 before:bg-white after:bg-white">OR</div>

          <!-- Demo Credentials -->
          <div class="text-white text-sm text-center space-y-1">
            <p><small>Demo Credentials:</small></p>
            <p><span class="font-semibold">Username:</span> admin</p>
            <p><span class="font-semibold">Password:</span> admin123</p>
          </div>
        </form>
      </div>
    </div>

    <!-- authentication js file -->
    <script src="js/auth.js"></script>
  </body>
</html>
