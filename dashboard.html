<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- title -->
    <title>GitHub Issues Tracker | Dashboard</title>

    <!-- favicon -->
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- tailwind + daisyui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- stylesheet -->
    <link rel="stylesheet" href="styles/styles.css" />
  </head>
  <body class="bg-linear-to-r from-[#000428] to-[#014d8f] min-h-screen">
    <!-- header -->
    <header class="sticky top-0 z-50">
      <!-- Navbar -->
      <div
        class="navbar flex flex-wrap gap-3 px-4 md:px-6 py-2 bg-white/20 backdrop-blur-xl border border-white/20 shadow-2xl"
      >
        <!-- Navbar Left -->
        <div class="flex items-center gap-2 flex-1 min-w-[200px]">
          <img
            src="./assets/github-logo.png"
            alt="github-logo"
            class="w-7 h-7 md:w-8 md:h-8 invert"
          />

          <span
            class="text-base md:text-xl font-bold text-white whitespace-nowrap"
          >
            GitHub Issues Tracker
          </span>
        </div>

        <!-- Navbar Right -->
        <div class="flex items-center gap-2 md:gap-3 w-full md:w-auto">
          <!-- Search -->
          <label
            class="input flex items-center gap-2 bg-white/20 text-white border-white/20 w-full md:w-auto"
          >
            <svg
              class="h-[1em] opacity-70"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
            >
              <g
                stroke-linejoin="round"
                stroke-linecap="round"
                stroke-width="2.5"
                fill="none"
                stroke="currentColor"
              >
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.3-4.3"></path>
              </g>
            </svg>

            <input
              id="search-input"
              type="text"
              placeholder="Search issues"
              class="bg-transparent outline-none placeholder-white/70 w-full md:w-40 lg:w-56"
            />
          </label>

          <!-- New Issue Button -->
          <button
            id="new-issue-btn"
            class="btn px-3 md:px-4 py-2 rounded-lg bg-linear-to-r from-[#000428] to-[#014d8f] border border-white/20 hover:opacity-90 text-white text-sm md:text-base font-semibold transition duration-300 whitespace-nowrap"
          >
            + New Issue
          </button>
        </div>
      </div>
    </header>

    <!-- Main Dashboard Content -->
    <main class="w-11/12 mx-auto p-6 text-white space-y-3">
      <!-- tabs container -->
      <div
        role="tablist"
        class="tabs tabs-box gap-3 mt-10 p-5 bg-white/20 backdrop-blur-xl border border-white/20 shadow-2xl"
      >
        <a
          role="tab"
          class="tab text-white backdrop-blur-xl border border-white/20 shadow-2xl tab-active"
          >All</a
        >
        <a
          role="tab"
          class="tab text-white backdrop-blur-xl border border-white/20 shadow-2xl"
          >Open</a
        >
        <a
          role="tab"
          class="tab text-white backdrop-blur-xl border border-white/20 shadow-2xl"
          >Closed</a
        >
      </div>

      <!-- Issues Section -->
      <section>
        <!-- Issues Section Content -->
        <div
          class="p-4 sm:p-5 bg-white/20 backdrop-blur-xl border border-white/20 shadow-2xl rounded-lg"
        >
          <!-- Top Content -->
          <div
            class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 pb-4"
          >
            <!-- Left Content -->
            <div class="flex items-center gap-3 sm:gap-4">
              <!-- Icon Circle -->
              <div
                class="w-10 h-10 flex items-center justify-center rounded-full bg-purple-200/75 shrink-0"
              >
                <img src="./assets/Closed- Status .png" alt="" class="w-5 h-5" />
              </div>

              <!-- Text -->
              <div>
                <h3 class="text-white font-semibold text-base sm:text-lg">
                  <span id="total-issues"></span> Issues
                </h3>
                <p class="text-white/70 text-xs sm:text-sm">
                  Track and manage your project issues
                </p>
              </div>
            </div>

            <!-- Right Status -->
            <div
              class="flex items-center gap-4 sm:gap-6 text-xs sm:text-sm text-white"
            >
              <div class="flex items-center gap-2">
                <span class="w-2.5 h-2.5 bg-green-400 rounded-full"></span>
                Open
              </div>

              <div class="flex items-center gap-2">
                <span class="w-2.5 h-2.5 bg-purple-400 rounded-full"></span>
                Closed
              </div>
            </div>
          </div>

          <!-- Divider -->
          <div class="border-t border-white/30 mb-4"></div>

          <!-- Issues Card Container -->
          <div
            id="issues-container"
            class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"
          >
            <!-- Issues Card goes here dynamically -->
          </div>

          <!-- Loading Spinner -->
          <div
            id="loading-spinner"
            class="hidden"
          >
            <svg
              class="animate-spin h-8 w-8 text-purple-500"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
            >
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              ></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8v8H4z"
              ></path>
            </svg>
          </div>

          <!-- Open the modal using ID.showModal() method -->
          <dialog id="my_modal_5" class="modal modal-middle">
            
          </dialog>
        </div>
      </section>
    </main>

    <!-- Dashboard JS -->
    <script src="js/script.js"></script>
  </body>
</html>
