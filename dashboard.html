<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- title -->
    <title>GitHub Issues Tracker | Dashboard</title>

    <!-- favicon -->
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- tailwind + daisyui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- stylesheet -->
    <link rel="stylesheet" href="styles/styles.css" />
  </head>
  <body class="bg-linear-to-r from-[#000428] to-[#014d8f] min-h-screen">
    
    <!-- header -->
    <header class="sticky top-0 z-50">
      <!-- Navbar -->
      <div
        class="navbar flex flex-wrap gap-3 px-4 md:px-6 py-2 bg-white/20 backdrop-blur-xl border border-white/20 shadow-2xl"
      >
        <!-- Navbar Left -->
        <div class="flex items-center gap-2 flex-1 min-w-[200px]">
          <img
            src="./assets/github-logo.png"
            alt="github-logo"
            class="w-7 h-7 md:w-8 md:h-8 invert"
          />

          <span
            class="text-base md:text-xl font-bold text-white whitespace-nowrap"
          >
            GitHub Issues Tracker
          </span>
        </div>

        <!-- Navbar Right -->
        <div class="flex items-center gap-2 md:gap-3 w-full md:w-auto">
          <!-- Search -->
          <label
            class="input flex items-center gap-2 bg-white/20 text-white border-white/20 w-full md:w-auto"
          >
            <svg
              class="h-[1em] opacity-70"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
            >
              <g
                stroke-linejoin="round"
                stroke-linecap="round"
                stroke-width="2.5"
                fill="none"
                stroke="currentColor"
              >
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.3-4.3"></path>
              </g>
            </svg>

            <input
              id="search-input"
              type="text"
              placeholder="Search issues"
              class="bg-transparent outline-none placeholder-white/70 w-full md:w-40 lg:w-56"
            />
          </label>

          <!-- New Issue Button -->
          <button
            id="new-issue-btn"
            class="btn px-3 md:px-4 py-2 rounded-lg bg-gradient-to-r from-[#000428] to-[#014d8f] border border-white/20 hover:opacity-90 text-white text-sm md:text-base font-semibold transition duration-300 whitespace-nowrap"
          >
            + New Issue
          </button>
        </div>
      </div>
    </header>

    <!-- Main Dashboard Content -->
    <main class="p-6 text-white">
      <h2 class="text-2xl font-bold mb-4">Issues Dashboard</h2>

      <!-- Issues Container -->
      <div id="issues-container" class="grid gap-4">
        <!-- Issue cards will appear here -->
      </div>
    </main>

    <!-- Dashboard JS -->
    <script src="js/script.js"></script>
  </body>
</html>
